databases:
  - name: rfid-db
    plan: free
    databaseName: rfid
    user: rfid

services:
  - type: web
    name: rfid-control
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile.cloud
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rfid-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"
