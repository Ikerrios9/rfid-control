<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Iniciar sesión — Sistema de Control de Acceso RFID">
    <title>Iniciar Sesión — RFID Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/style.css?v=2" rel="stylesheet">
    <script>
        (function() {
            const saved = localStorage.getItem('rfid_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>

<body class="login-page">
    <!-- Theme toggle floating -->
    <button onclick="toggleTheme()" id="loginThemeToggle" style="
        position: fixed; top: 20px; right: 20px; z-index: 100;
        background: var(--bg-card); border: 1px solid var(--border-glass);
        border-radius: var(--radius-sm); color: var(--text-secondary);
        padding: 10px 14px; cursor: pointer; font-size: 1.1rem;
        transition: var(--transition); backdrop-filter: blur(10px);
    " title="Cambiar tema">
        <i class="bi bi-sun-fill" id="loginThemeIcon"></i>
    </button>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="/static/img/logo.png" alt="Logo IES" onerror="this.style.display='none'">
                <h1>RFID Control</h1>
                <p>IES D. Antonio Hellín Costa · Puerto de Mazarrón</p>
            </div>

            {% if error %}
            <div class="login-error">
                <i class="bi bi-exclamation-triangle"></i> {{ error }}
            </div>
            {% endif %}

            <form class="login-form" action="/api/login" method="POST">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Introduce tu usuario" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Introduce tu contraseña" required>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="bi bi-shield-lock"></i> Iniciar Sesión
                </button>
            </form>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('rfid_theme', next);
            const icon = document.getElementById('loginThemeIcon');
            icon.className = next === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        }
        // Init icon
        const t = document.documentElement.getAttribute('data-theme') || 'dark';
        document.getElementById('loginThemeIcon').className = t === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    </script>
</body>

</html>
