<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla de Bienvenida — IES D. Antonio Hellín Costa</title>
    <link rel="icon" href="/static/img/logo.png" type="image/png">
    <style>
        :root {
            --bg-1: #0b1224;
            --bg-2: #111c3a;
            --gold: #eab308;
            --green: #22c55e;
            --blue: #60a5fa;
            --text: #e2e8f0;
            --muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 20% 10%, #1a2a55 0%, var(--bg-1) 55%) ,
                        radial-gradient(circle at 90% 90%, #1f1a44 0%, var(--bg-2) 60%);
            color: var(--text);
        }

        /* Sutil patrón de luz en el fondo */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(800px 400px at 50% -100px, rgba(234, 179, 8, 0.08), transparent 70%),
                radial-gradient(600px 300px at 50% 110%, rgba(96, 165, 250, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .stage {
            position: relative;
            z-index: 1;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        .logo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: white;
            padding: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45),
                        0 0 0 1px rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            animation: float 6s ease-in-out infinite;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-10px); }
        }

        h1.center-name {
            font-size: clamp(1.8rem, 3.4vw, 3rem);
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--gold);
            text-shadow: 0 4px 24px rgba(234, 179, 8, 0.25);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: clamp(0.9rem, 1.2vw, 1.1rem);
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 56px;
        }

        .message-card {
            min-height: clamp(180px, 22vh, 280px);
            min-width: clamp(320px, 60vw, 900px);
            padding: 36px 56px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .message-card.entrada {
            border-color: rgba(34, 197, 94, 0.45);
            box-shadow: 0 0 60px rgba(34, 197, 94, 0.15);
        }

        .message-card.salida {
            border-color: rgba(96, 165, 250, 0.45);
            box-shadow: 0 0 60px rgba(96, 165, 250, 0.15);
        }

        #welcomeMessage {
            font-size: clamp(2.4rem, 6vw, 5.2rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: 0.5px;
            color: var(--text);
            transition: color 0.4s ease;
        }

        #welcomeMessage.entrada { color: var(--green); }
        #welcomeMessage.salida  { color: var(--blue); }

        .name {
            display: block;
            margin-top: 16px;
            font-size: clamp(1.4rem, 2.6vw, 2.4rem);
            font-weight: 500;
            color: var(--text);
            letter-spacing: 0.3px;
        }

        .pulse-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--gold);
            margin-right: 12px;
            box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.6);
            animation: pulse 2s infinite;
            vertical-align: middle;
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.6); }
            70%  { box-shadow: 0 0 0 18px rgba(234, 179, 8, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); }
        }

        .footer {
            position: absolute;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 1px;
        }

        /* Animación de aparición de mensaje */
        @keyframes flashIn {
            0%   { transform: scale(0.92); opacity: 0; }
            60%  { transform: scale(1.04); opacity: 1; }
            100% { transform: scale(1); }
        }
        .flash { animation: flashIn 0.55s cubic-bezier(0.2, 0.9, 0.3, 1.2) both; }
    </style>
</head>
<body>
    <div class="stage">
        <div class="logo">
            <img src="/static/img/logo.png" alt="Logo IES">
        </div>

        <h1 class="center-name">IES D. Antonio Hellín Costa</h1>
        <p class="subtitle">Puerto de Mazarrón</p>

        <div class="message-card" id="messageCard">
            <div id="welcomeMessage">
                <span class="pulse-dot"></span>Acerca tu tarjeta
            </div>
        </div>

        <div class="footer">Sistema de Control de Acceso RFID</div>
    </div>

    <script>
        const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}/ws`);
        const card = document.getElementById('messageCard');
        const msgEl = document.getElementById('welcomeMessage');
        let timeoutId = null;

        const IDLE_HTML = '<span class="pulse-dot"></span>Acerca tu tarjeta';

        function resetIdle() {
            card.classList.remove('entrada', 'salida');
            msgEl.classList.remove('entrada', 'salida', 'flash');
            msgEl.innerHTML = IDLE_HTML;
        }

        ws.onopen  = () => console.log("✅ Display conectado");
        ws.onerror = (e) => console.error("WS Error", e);
        ws.onclose = () => {
            // Reintento simple si se cae la conexión
            setTimeout(() => location.reload(), 3000);
        };

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.tipo !== "nuevo_acceso" || !msg.datos) return;

                const data = msg.datos;
                const isEntrada = data.evento === "ENTRADA";
                const titulo = isEntrada ? "¡BIENVENIDO!" : "¡HASTA PRONTO!";
                const klass = isEntrada ? "entrada" : "salida";

                if (timeoutId) clearTimeout(timeoutId);

                card.classList.remove('entrada', 'salida');
                msgEl.classList.remove('entrada', 'salida', 'flash');
                // forzar reflow para reiniciar la animación
                void msgEl.offsetWidth;

                card.classList.add(klass);
                msgEl.classList.add(klass, 'flash');
                msgEl.innerHTML = `${titulo}<span class="name">${data.nombre || 'Alumno'}</span>`;

                timeoutId = setTimeout(resetIdle, 8000);
            } catch (e) {
                console.error("Error procesando mensaje:", e);
            }
        };
    </script>
</body>
</html>
